components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic Authentication using your Sauce Labs credentials.
        - **Username**: Your Sauce Labs username.
        - **Password**: Your Sauce Labs access key.

        You can find both your username and access key on the **Account > User Settings** page in the Sauce Labs UI.
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: about:blank
              title:
                type: string
                example: Device does not exist.
              detail:
                type: string
                example: 'The deviceId "Samsung XR" does not exist. Please ensure you provide an existing device Id.'
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            type: object
            description: "Error detailing a forbidden operation was attempted."
            properties:
              type:
                type: string
                example: "about:blank"
              title:
                type: string
                example: "Appium already started."
              detail:
                type: string
                example: "Appium server already started with version '2025-06-06'"
    NotAuthorized:
      description: Not Authorized
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              detail:
                type: string
                example: Authorization failed
    WDAAlreadyStarted:
      description: WDA already started
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "about:blank"
              title:
                type: string
                example: "WDARunner already started"
              detail:
                type: string
                example: "Current WDA state: RUNNING."
    DeviceSessionNotFound:
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: about:blank
              title:
                type: string
                example: Did not find session.
              detail:
                type: string
                example: Did not find session '123e4567-e89b-12d3-a456-426614174000'. Please make sure it exists and you have access to it.
    TooManyRequests:
      description: Too many requests
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Too many concurrent requests
    CloseDeviceSession:
      description: Session is closing
      content:
        application/json:
          schema:
            type: object
            properties:
              sessionId:
                $ref: "#/components/schemas/SessionId"
              state:
                $ref: "#/components/schemas/SessionState"
                example: CLOSING
    DeviceIsNotReady:
      description: Device not ready
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: about:blank
              title:
                type: string
                example: Device not ready.
              detail:
                type: string
                example: "You tried to interact with the device, but the state of your session is 'PENDING'. The state needs to be 'ACTIVE', if you want to interact with the device."
    CapabilityNotSupported:
      description: Capability not supported
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "about:blank"
              title:
                type: string
                example: "Capability not supported"
              detail:
                type: string
                example: "The requested capability is not supported on this device."
    BundleIdMissing:
      description: |
        Returned when a file operation is performed on an iOS device without providing the required `bundleId` parameter.
        On iOS, each app runs inside its own **sandbox** — an isolated file system container that prevents apps from accessing each other's data.
        Unlike Android, where you can access shared storage paths like `/sdcard/`, iOS requires you to specify which app's sandbox to operate on by providing its bundle identifier.
        To resolve this error, include the `bundleId` field in your request body with the target app's bundle identifier (e.g., `com.example.app`).
        See [Apple's File System documentation](https://developer.apple.com/library/archive/documentation/FileManagement/Conceptual/FileSystemProgrammingGuide/FileSystemOverview/FileSystemOverview.html) for more details on how iOS app sandboxing works.
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "about:blank"
              title:
                type: string
                example: "Bundle ID required"
              detail:
                type: string
                example: "The `bundleId` parameter is required for file operations on iOS devices. Each iOS app has its own sandboxed file system — provide the bundle identifier of the app whose files you want to access."
    DeviceFileOperationError:
      description: Device File Operation Error
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "about:blank"
              title:
                type: string
                example: "File operation failed"
              detail:
                type: string
                example: "Path not found"
              status:
                type: integer
                example: 500
  schemas:
    DeviceDescriptor:
      type: object
      description: "Device descriptor containing hardware and software specifications for a device type in the Sauce Labs device catalog. For public devices there can be multiple physical devices that share one descriptor."
      properties:
        id:
          type: string
          description: "Unique identifier for this device descriptor."
          example: "iPhone_15_Pro_real"
        name:
          type: string
          description: "Human-readable device name."
          example: "iPhone 15 Pro"
        modelNumber:
          type: string
          description: "Device model number."
          example: "A2848"
        manufacturer:
          type: array
          items:
            type: string
          description: "Device manufacturer(s)."
          example: ["Apple"]
        os:
          type: string
          enum: ["ANDROID", "IOS"]
          description: "Operating system type."
          example: "IOS"
        osVersion:
          type: string
          description: "Operating system version."
          example: "17.0"
        apiLevel:
          type: integer
          description: "Android API level. Only relevant for Android devices."
          example: 34
        abiType:
          type: string
          description: "CPU architecture/ABI type."
          example: "arm64-v8a"
        screenSize:
          type: number
          format: double
          description: "Screen diagonal size in inches."
          example: 6.1
        resolutionWidth:
          type: integer
          description: "Screen width in pixels."
          example: 1179
        resolutionHeight:
          type: integer
          description: "Screen height in pixels."
          example: 2556
        dpi:
          type: integer
          description: "Screen pixel density (dots per inch)."
          example: 460
        dpiName:
          type: string
          description: "Android DPI bucket name (ldpi, mdpi, hdpi, xhdpi, xxhdpi, xxxhdpi)."
          example: "xxhdpi"
        pixelsPerPoint:
          type: integer
          description: "iOS scale factor (pixels per point)."
          example: 3
        isTablet:
          type: boolean
          description: "Whether the device is a tablet form factor."
          example: false
        isArm:
          type: boolean
          description: "Whether the device has an ARM processor."
          example: true
        isPrivate:
          type: boolean
          description: "Whether this is a private device."
          example: false
        hasOnScreenButtons:
          type: boolean
          description: "Whether the device has software navigation buttons (Android)."
          example: false
        internalOrientation:
          type: string
          enum: ["PORTRAIT", "LANDSCAPE"]
          description: "Internal screen orientation."
          example: "PORTRAIT"
        defaultOrientation:
          type: string
          enum: ["PORTRAIT", "LANDSCAPE"]
          description: "Default screen orientation."
          example: "PORTRAIT"
        ramSize:
          type: integer
          description: "RAM size in MB."
          example: 6144
        internalStorageSize:
          type: integer
          description: "Internal storage size in MB."
          example: 128000
        sdCardSize:
          type: integer
          description: "SD card size in MB (Android only)."
          example: 0
        cpuCores:
          type: integer
          description: "Number of CPU cores."
          example: 6
        cpuFrequency:
          type: integer
          description: "CPU frequency in MHz."
          example: 3230
        cpuType:
          type: string
          enum: ["ARM", "X86"]
          description: "CPU architecture type."
          example: "ARM"
        deviceFamily:
          type: string
          enum: ["ANY", "IPHONE", "IPAD"]
          description: "iOS device family."
          example: "IPHONE"
        supportsMockLocations:
          type: boolean
          description: "Whether the device supports mock GPS locations."
          example: true
        supportsAppiumWebAppTesting:
          type: boolean
          description: "Whether the device supports Appium web testing."
          example: true
        supportsGlobalProxy:
          type: boolean
          description: "Whether the device supports global HTTP proxy."
          example: true
        supportsMinicapSocketConnection:
          type: boolean
          description: "Whether the device supports minicap socket streaming."
          example: true
        supportsManualWebTesting:
          type: boolean
          description: "Whether the device supports manual web testing."
          example: true
        supportsMultiTouch:
          type: boolean
          description: "Whether the device supports multi-touch gestures."
          example: true
        supportsXcuiTest:
          type: boolean
          description: "Whether the device supports XCUITest (iOS only)."
          example: true
        isKeyGuardDisabled:
          type: boolean
          description: "Whether the device keyguard/lock screen is disabled."
          example: true
        isRooted:
          type: boolean
          description: "Whether the device is rooted/jailbroken."
          example: false
        isAlternativeIoEnabled:
          type: boolean
          description: "Whether alternative I/O mode is enabled."
          example: true
      required:
        - id
        - name
        - os
        - osVersion
    DeviceStatus:
      type: string
      enum:
        - "AVAILABLE"
        - "IN_USE"
        - "CLEANING"
        - "REBOOTING"
        - "MAINTENANCE"
        - "OFFLINE"
      example: "IN_USE"
      description: Current device state. Private devices show specific states; public devices show aggregated states. If any device sharing a descriptorId is available, the descriptor is marked as available.
    Device:
      type: object
      properties:
        descriptor:
          type: string
          example: "iPhone_13_real"
        isPrivateDevice:
          type: boolean
          example: true
        state:
          $ref: "#/components/schemas/DeviceStatus"
        inUseBy:
          type: array
          items:
            type: object
            properties:
              username:
                type: string
                example: "john.smith"
            required:
              - username
      required:
        - descriptor
        - isPrivateDevice
        - state
    SessionId:
      type: string
      description: Unique id of device session
      example: "123e4567-e89b-12d3-a456-426614174000"
    Session:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/SessionId"
        state:
          $ref: "#/components/schemas/SessionState"
        expiresAt:
          type: string
          format: date-time
          description: |
            UTC timestamp when the active session expires and will be forcefully closed. Set via `sessionDuration` at creation. Mutually exclusive with `retainUntil`. Sessions longer than 6 hours may be closed before this time. When closed, transitions to terminal state and `retainUntil` is set.
          example: "2025-06-06T10:00:00Z"
        retainUntil:
          type: string
          format: date-time
          description: |
            UTC timestamp until which closed/errored sessions are retained before deletion. Mutually exclusive with `expiresAt`. Typically 5 minutes after closure or error.
          example: null
        device:
          type: object
          properties:
            descriptor:
              type: string
              example: "iPhone_13_real"
            deviceName:
              type: string
              example: "iPhone 13 real private"
            os:
              type: string
              example: "ANDROID"
            osVersion:
              type: string
              example: "15.0"
        appium:
          type: object
          properties:
            url:
              type: string
              example: "https://api.us-west-1.saucelabs.com/rdc/v2/sessions/2fe09ae3-5d01-4712-bfc0-1d873d20e554/appium/wd/hub"
              description: The hosted appium server endpoint associated to this session
            version:
              type: object
              example: "stable"
              description: The hosted appium server version
        links:
          type: object
          properties:
            ioWebsocketUrl:
              type: string
              example: "wss://api.us-west-1.saucelabs.com/rdc/v2/sessions/123e4567-e89b-12d3-a456-426614174000/wss/io"
            eventsWebsocketUrl:
              type: string
              example: "wss://api.us-west-1.saucelabs.com/rdc/v2/sessions/123e4567-e89b-12d3-a456-426614174000/wss/events"
              description: Websocket for retrieving realtime logs, device events, and some statistics
            liveViewUrl:
              type: string
              example: "https://app.saucelabs.com/live/mobile/dataCenters/US/devices/Samsung_Galaxy_S8_real2/shared/123e4567-e89b-12d3-a456-426614174000"
              description: Live test view for the openapi session
            adbUrl:
              type: string
              nullable: true
              example: "https://api.us-west-1.saucelabs.com/v1/rdc/vusb/forward"
              description: ADB forwarding URL for Android devices. Only set when the device OS is Android, null otherwise.
            usbmuxdUrl:
              type: string
              nullable: true
              example: "https://api.us-west-1.saucelabs.com/v1/rdc/vusb/usbmuxd"
              description: usbmuxd URL for iOS devices. Only set when the device OS is iOS, null otherwise.
            vusbUrl:
              type: string
              deprecated: true
              example: "https://api.us-west-1.saucelabs.com/v1/rdc/vusb/forward"
              description: "Deprecated: Use adbUrl for Android or usbmuxdUrl for iOS instead."
            deviceDescriptorUrl:
              type: string
              example: "https://api.us-west-1.saucelabs.com/rdc/v2/devices/iPhone_13_real"
              description: Link to the device descriptor with more details about the device
            self:
              type: string
              example: "https://api.us-west-1.saucelabs.com/rdc/v2/sessions/123e4567-e89b-12d3-a456-426614174000"

    AppiumSession:
      type: object
      properties:
        url:
          type: string
          example: "https://api.us-west-1.saucelabs.com/rdc/v2/sessions/2fe09ae3-5d01-4712-bfc0-1d873d20e554/appium/wd/hub"
          description: The hosted appium server endpoint associated to this session
        version:
          type: object
          example: "stable"
          description: The hosted appium server version

    AppiumVersion:
      type: object
      description: "A supported Appium version available for Real Devices."
      properties:
        name:
          type: string
          description: "The Appium version identifier. Pass this value as `appiumVersion` when starting an Appium server."
          example: "appium3-2026-01"
        eolDate:
          type: string
          format: date
          nullable: true
          description: "End-of-life date for this version (ISO-8601 date). Null if the version has no scheduled EOL."
          example: "2027-01-01"
      required:
        - name
    SessionCreation:
      type: object
      properties:
        id:
          type: string
        state:
          $ref: "#/components/schemas/SessionState"
    SessionState:
      type: string
      enum:
        - "PENDING"
        - "CREATING"
        - "ACTIVE"
        - "CLOSING"
        - "CLOSED"
        - "ERRORED"
      example: "CREATING"
    RebootDevice:
      type: boolean
      default: false
    TunnelConfiguration:
      type: object
      properties:
        name:
          type: string
          description: "Name of Sauce Connect tunnel to be used in this session"
          example: us_west_sauce_connect_tunnel
        owner:
          type: string
          description: "Owner of Sauce Connect tunnel, if not current user"
          example: some_user_name
      required:
        - name
    AppInstallationStatus:
      type: object
      description: Status of an ongoing or completed app installation process
      properties:
        installationId:
          type: string
          description: "Identifier of this app installation process"
        app:
          type: string
          description: "This should be the location of your app in Sauce Labs App Storage Service or Ephemeral app (e.g., storage:filename=myapp.apk, storage:uuid, https://www.myserver.com/files/myapp.apk)"
          example: "storage:c78ec45e-ea3e-ac6a-b094-00364171addb"
        status:
          type: string
          enum:
            - "PENDING"
            - "FINISHED"
            - "ERROR"
    LaunchWDARequest:
      type: object
      properties:
        bundleId:
          type: string
          description: "Bundle identifier of the installed WDA"
          example: "com.facebook.WebDriverAgent"
    RunningWDA:
      type: object
      properties:
        bundleId:
          type: string
          description: "Bundle identifier of the running WDA"
          example: "com.facebook.WebDriverAgent"
        devicePort:
          type: number
          description: "Port of WDA running in the device"
          example: 18100
        hostPort:
          type: number
          description: "Forwarded WDA for hosted appium use"
          example: 5900
        state:
          type: string
          enum:
            - "PENDING"
            - "LAUNCHING"
            - "RUNNING"
            - "ERROR"
        error:
          type: string
    AppInstallation:
      type: object
      description: Configuration for installing an app on a device.
      properties:
        app:
          type: string
          description: "This should be the location of your app in Sauce Labs App Storage Service (e.g., storage:filename=myapp.apk or storage:uuid)"
          example: "storage:c78ec45e-ea3e-ac6a-b094-00364171addb"
        enableInstrumentation:
          type: boolean
          default: true
          description: |
            Enable app instrumentation (includes app re-signing for iOS). Required for iOS app installation on cloud devices. Unlocks advanced features on both platforms. Automatically set to `true` if iOS app uses ad-hoc signing or advanced features are enabled. Setting to `false` may cause iOS installation failures and disables Android advanced features. Recommended: `true`.
          example: true
        launchAfterInstall:
          type: boolean
          default: false
          description: "If set to `true`, the app will automatically launch after a successful installation."
          example: true
        features:
          type: object
          properties:
            networkCapture:
              type: boolean
              default: false
              description: "Enable system-wide network capture."
              example: false
            deviceVitals:
              type: boolean
              default: false
              description: "Collect vitals from device while app is running."
              example: false
            imageInjection:
              type: boolean
              default: false
              description: "Enable image injection through camera API."
              example: false
            biometricsInterception:
              type: boolean
              default: false
              description: "Enable interception of biometrics checks."
              example: false
            bypassScreenshotRestriction:
              type: boolean
              default: false
              example: false
            errorReporting:
              type: boolean
              default: false
              example: false
      required:
        - app
    ListFilesRequest:
      type: object
      properties:
        path:
          type: string
          description: "The path to the directory to list files from."
          example: "/sdcard/Download/"
        bundleId:
          $ref: "#/components/schemas/BundleId"
      required:
        - path
    RemoveFilesRequest:
      type: object
      properties:
        path:
          type: string
          description: "The path of the file to remove."
          example: "/sdcard/folder/test.txt"
        bundleId:
          $ref: "#/components/schemas/BundleId"
      required:
        - path
    StatFileRequest:
      type: object
      properties:
        path:
          type: string
          description: "The absolute path of the file or directory on the device to get information about."
          example: "/sdcard/Download/report.txt"
        bundleId:
          $ref: "#/components/schemas/BundleId"
      required:
        - path
    PullFileRequest:
      type: object
      properties:
        path:
          type: string
          description: "The absolute path of the file on the device to retrieve."
          example: "/sdcard/Download/report.txt"
        bundleId:
          $ref: "#/components/schemas/BundleId"
      required:
        - path
    BundleId:
      type: string
      description: |
        The iOS app bundle identifier (e.g., `com.example.app`). Required for iOS devices, not needed for Android.
        On iOS, each app runs in its own **sandbox** — an isolated file system container that restricts access to only that app's data.
        This means you must specify which app's sandbox to operate on by providing its bundle ID.
        You can find the bundle ID in Xcode, in the app's `Info.plist`, or via the Sauce Labs app management API.
        See [Apple's File System documentation](https://developer.apple.com/library/archive/documentation/FileManagement/Conceptual/FileSystemProgrammingGuide/FileSystemOverview/FileSystemOverview.html) for more details.
      example: "com.example.app"
    FileInfo:
      type: object
      properties:
        path:
          type: string
          description: "The absolute path of the file or directory on the device."
          example: "/sdcard/Download/report.txt"
        size:
          type: integer
          format: int64
          description: "The size of the file in bytes. 0 for directories."
          example: 1024
        isDirectory:
          type: boolean
          description: "Whether the path is a directory."
          example: false
    NetworkConditions:
      type: object
      description: Network condition parameters applied to the device.
      properties:
        downloadSpeed:
          type: integer
          description: "Download speed in kbps (0 - 50000)."
          example: 5000
        uploadSpeed:
          type: integer
          description: "Upload speed in kbps (0 - 50000)."
          example: 3000
        latency:
          type: integer
          description: "Latency in ms (0 - 3000)."
          example: 200
        loss:
          type: integer
          description: "Packet loss percentage (0 - 100)."
          example: 2
    NetworkProfile:
      type: object
      properties:
        id:
          type: string
          description: "The profile identifier."
          example: "4G-fast"
        name:
          type: string
          description: "Human-readable profile name."
          example: "4G Fast"
        conditions:
          $ref: "#/components/schemas/NetworkConditions"
    NetworkProfiles:
      type: object
      properties:
        networkProfiles:
          type: array
          items:
            $ref: "#/components/schemas/NetworkProfile"
    NetworkProfileRequest:
      type: object
      required:
        - networkProfile
      properties:
        networkProfile:
          type: string
          description: "The ID of the predefined network profile to apply."
          example: "4G-fast"
    NetworkConditionsRequest:
      type: object
      required:
        - networkConditions
      properties:
        networkConditions:
          $ref: "#/components/schemas/NetworkConditions"
