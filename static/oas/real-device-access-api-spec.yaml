openapi: "3.0.0"
info:
  version: "2.0.0"
  title: "Real Device Access API Reference"
  x-last-modified: "2025-11-19"
  x-beta: false
  description: |
    Access Sauce Labs' specialized real device farm to automate, test, and develop on real iOS and Android devices in the cloud. This API opens up our device infrastructure, enabling you to go beyond traditional testing workflows. Reserve a device once, then run multiple operations back-to-back on the same session—whether you're running automated tests, developing new features, or building custom automation workflows.

    Once you have an active device session, interact with the device directly—install apps, execute shell commands, modify device settings, capture screenshots, and launch applications. For Android devices, access low-level ADB capabilities as if the device is connected locally. For iOS devices, access WebDriverAgent directly, or deploy your own fork of WebDriverAgent on the device. Our app resigning and instrumentation capabilities automatically handle code signing and provisioning for our diverse device fleet. Start a hosted Appium server, connect your own automation tools, or use the HTTP proxy for advanced scenarios.

    **New to this API?** Start with the [Real Device Access API Guide](https://docs.saucelabs.com/mobile-apps/real-device-access-api/real-device-access-api-introduction/) for authentication setup, integration walkthroughs, and advanced usage patterns.

servers:
  - url: https://api.us-west-1.saucelabs.com/rdc/v2/
    description: US West
  - url: https://api.eu-central-1.saucelabs.com/rdc/v2/
    description: EU Central
  - url: https://api.us-east-4.saucelabs.com/rdc/v2/
    description: US East
security:
  - basicAuth: []

tags:
  - name: Device Catalog
    description: View the catalog of devices available to you and the current state of the devices.
  - name: Session Lifecycle
    description: Create, Inspect and Close your Sauce Labs Real Device session.
  - name: Device Interactions
    description: Interact with your Device.
  - name: Device File Management
    description: Manage files on the device storage.
  - name: Appium Server
    description: Start an Appium Server in our Sauce Cloud. This server runs next to your device and will remain active as long as the device session is active.
  - name: Network Throttling
    description: Simulate different network conditions on the device to test your app under various connectivity scenarios.
  - name: HTTP Proxy
    description: Allows you to proxy HTTP/S to your device. Can be used as a port-forward to your device.
paths:
  /devices:
    get:
      summary: "List all device descriptors"
      description: "List our catalog of devices available to you. Use this endpoint to retrieve 'device descriptors'. Note: for public devices there can be multiple physical devices that share one 'device descriptor'"
      tags:
        - "Device Catalog"
      parameters:
        - name: deviceId
          in: query
          description: "Filter by device identifier (supports regex). Matches the descriptor ID or device name."
          required: false
          schema:
            type: string
            example: "iPhone.*"
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceDescriptor"
        "401":
          $ref: "#/components/responses/NotAuthorized"
  /devices/status:
    get:
      summary: "List the status of all devices"
      description: "Lists the current status of all devices. For private devices, additional details are available, including the precise state and current user. The delay of this state is < 1s."
      tags:
        - "Device Catalog"
      parameters:
        - name: state
          in: query
          description: Filter by device state
          style: form
          explode: true
          schema:
            $ref: "#/components/schemas/DeviceStatus"
        - name: privateOnly
          in: query
          description: Show only private devices for the authenticated customer
          schema:
            type: boolean
        - name: deviceName
          in: query
          description: "Filter by device identifier (supports regex). Matches both descriptor and deviceName fields."
          schema:
            type: string
            example: "iPhone.*"
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/NotAuthorized"
  /sessions:
    post:
      summary: "Allocate a device and create a new session"
      description: |
        Creates a new device session.
      tags:
        - "Session Lifecycle"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                device:
                  type: object
                  properties:
                    deviceName:
                      type: string
                      description: "Device identifier (supports regex). If omitted, any device will be selected. Matches both descriptor and deviceName fields."
                      example: "iPhone_16_real"
                    os:
                      description: Filter by operating system (Android or iOS). The enum is case insensitive.
                      type: string
                      enum: [android, ios]
                      example: ios
                configuration:
                  type: object
                  properties:
                    tunnel:
                      type: object
                      $ref: "#/components/schemas/TunnelConfiguration"
                    sessionDuration:
                      type: string
                      format: ISO-8601
                      description: 'Session duration in ISO-8601 format. Sets the expiresAt timestamp; sessions will be forcefully closed after that time. Default: 6 hours. Max: 24 hours. Sessions longer than 6 hours may be forcefully closed before expiresAt.'
                      example: "PT1H"
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionCreation"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      summary: List device sessions
      description: Retrieves a list of device sessions, including pending, active and recently closed sessions.
      tags:
        - "Session Lifecycle"
      parameters:
        - name: state
          in: query
          required: false
          description: Filter out sessions returned based on state
          schema:
            $ref: "#/components/schemas/SessionState"
        - name: deviceName
          in: query
          required: false
          description: "Filter by device identifier (supports regex). Matches both descriptor and deviceName fields."
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/NotAuthorized"
  /sessions/{sessionId}:
    get:
      summary: Get details of a specific device session
      tags:
        - "Session Lifecycle"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
    delete:
      summary: Close and release a device session
      tags:
        - "Session Lifecycle"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
        - name : rebootDevice
          in: query
          required: false
          description: Perform a device reboot after session release. Only applicable for private devices.
          schema:
            $ref: "#/components/schemas/RebootDevice"
      responses:
        "200":
          $ref: "#/components/responses/CloseDeviceSession"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/device/executeShellCommand:
    post:
      summary: Execute an adb shell command on an Android device
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - adbShellCommand
              properties:
                adbShellCommand:
                  type: string
                  description: "The shell command to execute on the device. Note: you do not need to prefix your command with 'adb shell' to run."
                  example: "ls /"
      responses:
        "200":
          description: Command executed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  stdout:
                    type: string
                    description: The stdout of your shell command.
                    example: "acct                debug_ramdisk      keyrefuge       sdcard\napex                default.prop       linkerconfig    sepolicy_version\naudit_filter_table  dev                lost+found      spu\nbin                 dpolicy            mnt             storage\n"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
        "502":
          description: Temporary network error while proxying adb shell command to device.
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: about:blank
                  title:
                    type: string
                    example: ADB command error
                  detail:
                    type: string
                    example: Temporary network error occurred while sending adb command to device. Please try again or pick another device. If this issue persists please get in contact with your Sauce Labs representative.
        "504":
          description: Timeout occurred while proxying adb shell command to device.
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: about:blank
                  title:
                    type: string
                    example: ADB command error
                  detail:
                    type: string
                    example: Timed out while waiting for adb command to complete. Please do not execute long running adb commands. If this issue persists please get in contact with your Sauce Labs representative.

  /sessions/{sessionId}/device/openUrl:
    post:
      summary: Open a url (through browser) or a deeplink to an app
      description: "Opens a URL or deeplink based on the URL scheme. iOS supports deeplinking; Android opens all URLs in Chrome."
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  example: "https://example.com"
      responses:
        "204":
          description: Command executed successfully
        "400":
          $ref: "#/components/responses/DeviceIsNotReady"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/device/installApp:
    post:
      summary: Install an app from App Storage
      description: Install an app on the device. The installation will take place in the background. Use listAppInstallations to query for status.
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppInstallation"
      responses:
        "200":
          description: Command executed successfully
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/AppInstallationStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/device/listAppInstallations:
    post:
      summary: List ongoing, completed and failed app installations
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      responses:
        "200":
          description: Command executed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  appInstallations:
                    type: array
                    items:
                      $ref: "#/components/schemas/AppInstallationStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/device/uninstallApp:
    post:
      summary: Uninstall an app currently installed on the device
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: "Requires either a 'bundleId' for iOS or a 'packageName' for Android, but not both."
              oneOf:
                - type: object
                  required:
                    - bundleId
                  properties:
                    bundleId:
                      type: string
                      description: "The bundle identifier of the iOS app to uninstall."
                      example: "com.saucelabs.rdc.demo"
                - type: object
                  required:
                    - packageName
                  properties:
                    packageName:
                      type: string
                      description: "The package name of the Android app to uninstall."
                      example: "com.saucelabs.mydemoapp.android"
      responses:
        "204":
          description: Command executed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/device/applySettings:
    post:
      summary: Change device configuration
      description: |
        Changes device settings such as orientation, locale, or animations during an active session.
        The request body must contain **at least one** of the properties below.
        **Note**: Some settings are OS-specific. Please review the parameter descriptions for details.
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                orientation:
                  type: string
                  description: "The desired screen orientation. Supported on both **Android** and **iOS**."
                  enum:
                    - "PORTRAIT"
                    - "LANDSCAPE"
                  example: "PORTRAIT"
                locale:
                  type: string
                  description: "**Android only.** Sets the system-wide language and country (IETF BCP 47 format, e.g., 'en-US', 'fr-CA'). Not supported on iOS because changing locale requires a device reboot, which is not supported during an active session."
                  example: "en_US"
                animations:
                  type: boolean
                  description: "**Android only.** Enable or disable system animations to improve test stability and speed."
                  example: false
      responses:
        "204":
          description: Command executed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/device/launchApp:
    post:
      summary: Launch an app on device
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                bundleId:
                  type: string
                  description: Bundle identifier (iOS)
                  example: "com.apple.XXX"
                packageName:
                  type: string
                  description: Package Name of app to launch (Android)
                  example: "com.android.XXX"
                activityName:
                  type: string
                  description: Main Activity Name of app to launch (Android)
                  example: "com.android.XXX.Activity"
      responses:
        "200":
          description: Command executed successfully
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/device/launchWebDriverAgent:
    post:
      summary: Launch WDA installed on the device
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/LaunchWDARequest"
      responses:
        "200":
          description: Command executed successfully
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/RunningWDA"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
        "409":
          $ref: "#/components/responses/WDAAlreadyStarted"

  /sessions/{sessionId}/device/checkWebDriverAgentStatus:
    post:
      summary: Get launching status for WDA
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Command executed successfully
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/RunningWDA"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/device/takeScreenshot:
    post:
      summary: Take a screenshot from device
      description: Takes a screenshot from the device and returns a PNG representation.
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/device/enableNetworkCapture:
    post:
      summary: Start network traffic capture
      description: Initiates system-wide network traffic capture for the device session.
      tags:
        - "Device Interactions"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      responses:
        "204":
          description: Network capture started successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

    /sessions/{sessionId}/device/disableNetworkCapture:
      post:
        summary: Stop network traffic capture
        description: Stops the ongoing system-wide network traffic capture for the device session. Returns HTTP 204.
        tags:
          - "Device Interactions"
        parameters:
          - name: sessionId
            in: path
            required: true
            description: The id of the device session
            schema:
              type: string
        responses:
          "204":
            description: Network capture stopped successfully
          "400":
            $ref: "#/components/responses/BadRequest"
          "404":
            $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/network/profiles:
    get:
      summary: List predefined network profiles
      description: Returns the list of predefined network profiles that can be applied to the device session.
      tags:
        - "Network Throttling"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      responses:
        "200":
          description: List of available network profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkProfiles"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/network/profile:
    post:
      summary: Set a predefined network profile
      description: Applies a predefined network profile (e.g. `2G`, `4G-fast`) to the device session. Profiles are mapped to network conditions internally—the resolved conditions are returned in the response. Use `DELETE /sessions/{sessionId}/network/condition` to reset.
      tags:
        - "Network Throttling"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkProfileRequest"
      responses:
        "200":
          description: Network profile applied successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkConditions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/network/condition:
    post:
      summary: Set custom network conditions
      description: Applies custom network conditions to the device session. Only specified parameters will be conditioned. The applied network conditions are returned in the response.
      tags:
        - "Network Throttling"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkConditionsRequest"
      responses:
        "200":
          description: Network conditions applied successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkConditions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
    delete:
      summary: Reset network conditions
      description: Removes all network throttling from the device session, restoring normal network connectivity. This resets conditions regardless of whether they were set via a predefined profile or custom conditions, since profiles are mapped to conditions internally.
      tags:
        - "Network Throttling"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      responses:
        "204":
          description: Network conditions reset successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /sessions/{sessionId}/appiumserver:
    post:
      summary: Start an Appium server that runs next to the device.
      tags:
        - "Appium Server"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                appiumVersion:
                  type: string
                  description: >
                    The Appium version to use. If omitted, the platform default version is used.
                    Use `GET /appium/versions` to list available versions.
                    See https://docs.saucelabs.com/mobile-apps/automated-testing/appium/appium-versions/#real-devices
                  example: "appium2-202501010004"
      responses:
        "200":
          description: Command executed successfully
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/AppiumSession"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
    get:
      summary: Get details of the status of the hosted appium server
      tags:
        - "Appium Server"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      responses:
        "200":
          description: Command executed successfully
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/AppiumSession"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"

  /appium/versions:
    get:
      summary: Get the list of supported Appium versions for Real Devices
      description: |
        Returns all Appium versions currently available for use on Real Devices,
        sorted by end-of-life date (latest EOL first). Versions with no scheduled
        EOL appear at the end of the list.
      tags:
        - "Appium Server"
      responses:
        "200":
          description: List of supported Appium versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/AppiumVersion"

  /sessions/{sessionId}/device/listFiles:
    post:
      summary: List files in a directory on the device
      description: |
        Returns a list of files and directories at the specified path on the device storage.
      tags:
        - "Device File Management"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListFilesRequest"
      responses:
        "200":
          description: List of files retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: "/sdcard/Download/file.txt"
        "400":
          oneOf:
            - $ref: "#/components/responses/BadRequest"
            - $ref: "#/components/responses/BundleIdMissing"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
        "422":
          $ref: "#/components/responses/CapabilityNotSupported"
        "500":
          $ref: "#/components/responses/DeviceFileOperationError"

  /sessions/{sessionId}/device/removeFile:
    post:
      summary: Remove a file from the device
      description: |
        Deletes a specific file from the device storage.
      tags:
        - "Device File Management"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveFilesRequest"
      responses:
        "204":
          description: File removed successfully
        "400":
          oneOf:
            - $ref: "#/components/responses/BadRequest"
            - $ref: "#/components/responses/BundleIdMissing"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
        "422":
          $ref: "#/components/responses/CapabilityNotSupported"
        "500":
          $ref: "#/components/responses/DeviceFileOperationError"

  /sessions/{sessionId}/device/statFile:
    post:
      summary: Get file information from the device
      description: |
        Returns metadata about a specific file or directory on the device storage, including its path, size, and whether it is a directory.
      tags:
        - "Device File Management"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatFileRequest"
      responses:
        "200":
          description: File information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfo"
        "400":
          oneOf:
            - $ref: "#/components/responses/BadRequest"
            - $ref: "#/components/responses/BundleIdMissing"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
        "422":
          $ref: "#/components/responses/CapabilityNotSupported"
        "500":
          $ref: "#/components/responses/DeviceFileOperationError"

  /sessions/{sessionId}/device/pushFile:
    post:
      summary: Push a file to the device
      description: |
        Uploads a file to the specified destination path on the device storage.
        **Format**: Multipart Form Data.
      tags:
        - "Device File Management"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - destinationPath
                - file
              properties:
                destinationPath:
                  type: string
                  description: "The absolute path on the device where the file should be saved (e.g., /sdcard/Download/image.png)."
                  example: "/sdcard/Download/test-image.png"
                bundleId:
                  $ref: "#/components/schemas/BundleId"
                file:
                  type: string
                  format: binary
                  description: "The binary content of the file to upload."
      responses:
        "204":
          description: File uploaded successfully
        "400":
          oneOf:
            - $ref: "#/components/responses/BadRequest"
            - $ref: "#/components/responses/BundleIdMissing"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
        "422":
          $ref: "#/components/responses/CapabilityNotSupported"
        "500":
          $ref: "#/components/responses/DeviceFileOperationError"

  /sessions/{sessionId}/device/pullFile:
    post:
      summary: Pull a file from the device
      description: |
        Retrieves a file from the device storage as a binary stream.
      tags:
        - "Device File Management"
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The id of the device session
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullFileRequest"
      responses:
        "200":
          description: File retrieved successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              description: Indicates the filename of the downloaded file.
              schema:
                type: string
                example: 'attachment; filename="report.txt"'
        "400":
          oneOf:
            - $ref: "#/components/responses/BadRequest"
            - $ref: "#/components/responses/BundleIdMissing"
        "404":
          $ref: "#/components/responses/DeviceSessionNotFound"
        "422":
          $ref: "#/components/responses/CapabilityNotSupported"
        "500":
          $ref: "#/components/responses/DeviceFileOperationError"

